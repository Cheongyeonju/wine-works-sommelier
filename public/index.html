<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wine Works</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <!-- 사이드바 -->
  <aside class="sidebar">
    <div class="sidebar-logo">WINE WORKS <span>The Hyundai Seoul</span></div>
    <div class="sidebar-table">TABLE <strong>08</strong></div>
    <nav class="category-list" id="categoryList">
      <button class="category-item active" onclick="showCategory('스테이크', this)">스테이크</button>
      <button class="category-item" onclick="showCategory('파스타', this)">파스타</button>
      <button class="category-item" onclick="showCategory('피자', this)">피자</button>
      <button class="category-item" onclick="showCategory('해산물', this)">해산물</button>
      <button class="category-item" onclick="showCategory('사이드', this)">사이드</button>
      <button class="category-item" onclick="showCategory('디저트', this)">디저트</button>
      <button class="category-item" onclick="showCategory('와인', this)">🍷 와인</button>
    </nav>
    <button class="sidebar-cart-btn" onclick="showCart()">
      🛒 장바구니
      <span class="cart-count" id="cartCount">0</span>
    </button>
  </aside>

  <!-- 메인 -->
  <div class="main">

    <!-- 메뉴 화면 -->
    <div id="menuScreen">
      <div class="top-bar">
        <div class="top-bar-title" id="categoryTitle">스테이크 <span>(Steak)</span></div>
        <div class="top-bar-actions">
          <button class="btn-staff">직원호출 🔔</button>
        </div>
      </div>
      <div class="menu-area">
        <div class="menu-grid" id="menuGrid"></div>
      </div>
    </div>

    <!-- 장바구니 화면 -->
    <div class="cart-screen" id="cartScreen">
      <div class="cart-header">
        <button class="btn-back" onclick="showMenu()">←</button>
        <h2>장바구니</h2>
      </div>
      <div class="cart-items" id="cartItems"></div>
      <div class="wine-recommend-section">
        <h3>🍷 이 음식들과 잘 어울리는 와인</h3>
        <div id="wineRecommendArea">
          <div class="wine-loading">
            <div class="dots"><span></span><span></span><span></span></div>
          </div>
        </div>
      </div>
      <div class="cart-footer">
        <div class="cart-total">
          <span>합계</span>
          <span id="cartTotal">0 원</span>
        </div>
        <button class="btn-order">주문하기</button>
      </div>
    </div>

  </div>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
